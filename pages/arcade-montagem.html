        <!-- Lightbox modal -->
        <div id="lightbox" class="lightbox hidden" aria-hidden="true">
          <div class="lb-toolbar">
            <span id="lbIndex">0 / 0</span>
            <span id="lbZoom" aria-label="Zoom">100%</span>
            <div class="lb-actions"><button id="lbDownload" title="Download" disabled>Download</button></div>
          </div>
          <button class="lb-close" aria-label="Fechar">×</button>
          <button class="lb-prev" aria-label="Anterior">‹</button>
          <div class="lb-content" id="lbContent" role="dialog" aria-modal="true"></div>
          <button class="lb-next" aria-label="Próximo">›</button>
          <div class="lb-caption" id="lbCaption"></div>
        </div>

        <script>
          (function(){
            const figs = Array.from(document.querySelectorAll('.media-gallery figure'));
            const total = figs.length;
            const lightbox = document.getElementById('lightbox');
            const lbContent = document.getElementById('lbContent');
            const lbCaption = document.getElementById('lbCaption');
            const lbIndex = document.getElementById('lbIndex');
            const lbZoom = document.getElementById('lbZoom');
            const btnDownload = document.getElementById('lbDownload');
            const btnClose = lightbox.querySelector('.lb-close');
            const btnPrev = lightbox.querySelector('.lb-prev');
            const btnNext = lightbox.querySelector('.lb-next');
            let idx = 0;

            // set progressive attributes for thumbnails
            document.querySelectorAll('.media-gallery img').forEach(img=>{ img.loading='lazy'; img.decoding='async'; });

            function updateToolbar(){ lbIndex.textContent = `${idx+1} / ${total}`; updateZoomIndicator(); }
            function updateZoomIndicator(){ lbZoom.textContent = `${Math.round(scale * 100)}%`; }

            function enableDownload(src, type){
              if(type === 'image'){
                btnDownload.disabled = false;
                btnDownload.onclick = ()=>{
                  const a = document.createElement('a'); a.href = src; a.download = src.split('/').pop(); document.body.appendChild(a); a.click(); a.remove();
                };
              } else {
                btnDownload.disabled = true; btnDownload.onclick = null;
              }
            }

            function preloadNext(){
              const nextIdx = (idx+1) % total;
              const next = figs[nextIdx];
              if(next && next.getAttribute('data-type') === 'image'){
                const p = new Image(); p.src = next.getAttribute('data-src');
              }
            }

            // zoom/pan state
            let scale=1, minScale=1, maxScale=3, translateX=0, translateY=0;
            let isPanning=false, panStartX=0, panStartY=0, originX=0, originY=0;

            function resetZoom(){
              scale = 1; translateX = 0; translateY = 0;
              const el = lbContent.querySelector('img');
              if(el){ el.style.transform = ''; el.classList.remove('lb-zoomed'); el.classList.remove('dragging'); }
              updateZoomIndicator();
            }

            function updateTransform(){
              const el = lbContent.querySelector('img');
              if(!el) return;
              el.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
              if(scale>1) el.classList.add('lb-zoomed'); else el.classList.remove('lb-zoomed');
            }

            function attachZoomHandlers(img){
              // replace with a clean node to avoid duplicate listeners
              const img2 = img.cloneNode(true);
              img.parentNode.replaceChild(img2, img);
              const el = img2;

              el.addEventListener('dblclick', (e)=>{ e.preventDefault(); if(scale>1) resetZoom(); else { scale = Math.min(2.2, maxScale); updateTransform(); updateZoomIndicator(); } });

              el.addEventListener('pointerdown', (e)=>{
                if(scale<=1) return;
                e.preventDefault();
                isPanning=true;
                el.setPointerCapture(e.pointerId);
                panStartX = e.clientX; panStartY = e.clientY;
                originX = translateX; originY = translateY;
                el.classList.add('dragging');
              });

              el.addEventListener('pointermove', (e)=>{
                if(!isPanning) return;
                e.preventDefault();
                const dx = e.clientX - panStartX; const dy = e.clientY - panStartY;
                translateX = originX + dx; translateY = originY + dy;
                updateTransform();
              });

              el.addEventListener('pointerup', (e)=>{
                if(!isPanning) return; isPanning=false;
                try{ el.releasePointerCapture(e.pointerId); }catch(_){}
                el.classList.remove('dragging');
              });

              el.addEventListener('pointercancel', ()=>{ isPanning=false; el.classList.remove('dragging'); });

              // wheel zoom (keep pointer focal)
              lbContent.addEventListener('wheel', function onWheel(e){
                if(!lbContent.contains(el)) return;
                if(e.ctrlKey) return;
                e.preventDefault();
                const rect = el.getBoundingClientRect();
                const offsetX = e.clientX - rect.left;
                const offsetY = e.clientY - rect.top;
                const delta = -e.deltaY * 0.0015;
                const newScale = Math.max(minScale, Math.min(maxScale, scale*(1+delta)));
                const ratio = newScale/scale;
                translateX = (translateX - offsetX) * ratio + offsetX;
                translateY = (translateY - offsetY) * ratio + offsetY;
                scale = newScale;
                updateTransform();
                updateZoomIndicator();
              }, { passive: false });

              // touch: simple double-tap to toggle zoom
              let lastTap = 0;
              el.addEventListener('touchend', (ev)=>{
                const now = Date.now();
                if(now - lastTap < 300){
                  ev.preventDefault();
                  if(scale>1) resetZoom(); else { scale = 2; updateTransform(); updateZoomIndicator(); }
                }
                lastTap = now;
              });

            }

            function show(i){
              idx = (i + total) % total;
              const f = figs[idx];
              const src = f.getAttribute('data-src');
              const type = f.getAttribute('data-type');
              lbContent.innerHTML = '';
              resetZoom();
              if(type === 'video'){
                const v = document.createElement('video');
                v.src = src; v.controls = true; v.autoplay = true; v.style.maxWidth = '100%'; v.playsInline = true;
                lbContent.appendChild(v);
              } else {
                const im = document.createElement('img');
                im.src = src; im.alt = f.querySelector('figcaption')?.textContent || '';
                im.style.maxWidth = '100%';
                lbContent.appendChild(im);
                // attach zoom handlers after inserted
                setTimeout(()=> attachZoomHandlers(im), 30);
              }
              lbCaption.textContent = f.querySelector('figcaption')?.textContent || '';
              updateToolbar();
              enableDownload(src, type);
              lightbox.classList.remove('hidden');
              lightbox.setAttribute('aria-hidden','false');
              btnClose.focus();
              preloadNext();
            }

            function close(){ lightbox.classList.add('hidden'); lightbox.setAttribute('aria-hidden','true'); lbContent.innerHTML=''; resetZoom(); }
            function next(){ show(idx+1); }
            function prev(){ show(idx-1); }

            figs.forEach((f,i)=> f.addEventListener('click', ()=> show(i)));
            btnClose.addEventListener('click', close);
            btnNext.addEventListener('click', next);
            btnPrev.addEventListener('click', prev);
            lightbox.addEventListener('click', (e)=>{ if(e.target===lightbox) close(); });
            document.addEventListener('keydown', (e)=>{ if(lightbox.classList.contains('hidden')) return; if(e.key === 'Escape') close(); if(e.key === 'ArrowRight') next(); if(e.key === 'ArrowLeft') prev(); });

            // initialize toolbar count
            lbIndex.textContent = `0 / ${total}`;
          })();
        </script>
